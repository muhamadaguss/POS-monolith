[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf

# Baca log dari Docker containers via filesystem.
# Path default Docker JSON log driver: /var/lib/docker/containers/<id>/<id>-json.log
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.*
    Refresh_Interval  5
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /fluent-bit/tail.db

# Parse pino JSON log dari backend NestJS.
# Backend log sudah JSON 1-baris (nestjs-pino), di-wrap Docker JSON driver
# di field "log". Filter ini mengurai field "log" agar struktur internal pino
# (level, msg, req, res, responseTime, reqId) bisa di-query Loki.
[FILTER]
    Name          parser
    Match         docker.*
    Key_Name      log
    Parser        pino
    Reserve_Data  On

# Tambah label "service" agar bisa di-query: {service="backend"}
# Nilai default "kasirku" untuk semua container; nanti bisa di-override per service.
[FILTER]
    Name          modify
    Match         docker.*
    Add           service kasirku

# Output ke Loki via HTTP (snappy-compressed protobuf).
# Loki jalan di host yang sama, internal Docker network.
[OUTPUT]
    Name                    loki
    Match                   *
    Host                    loki
    Port                    3100
    Labels                  {job="fluent-bit"}
    Label_Keys              service
    Line_Format             json
    Auto_Kubernetes_Labels  Off
