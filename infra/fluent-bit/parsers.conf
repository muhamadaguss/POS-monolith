# Parser untuk Docker JSON log driver output.
# Format: {"log":"...","stream":"stdout","time":"2024-01-01T00:00:00.000Z"}
[PARSER]
    Name        docker
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%L
    Time_Keep   On

# Parser untuk pino JSON log (nestjs-pino output).
# Backend Kasirku menggunakan nestjs-pino yang output JSON 1-baris di production.
# Field penting: level, time, msg, req.id, req.method, req.url,
#               res.statusCode, responseTime, service, environment
[PARSER]
    Name        pino
    Format      json
    Time_Key    time
    Time_Format %Y-%m-%dT%H:%M:%S.%LZ
    Time_Keep   On
