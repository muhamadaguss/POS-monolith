name: Security

# Pemindaian keamanan untuk seluruh monorepo:
#   1. npm audit (ADVISORY) — laporkan kerentanan dependency high/critical per
#      paket. Non-blocking untuk saat ini karena ada utang high pre-existing
#      (rantai multer → @nestjs/platform-express). Begitu utang itu beres,
#      hapus `continue-on-error` agar jadi gate keras.
#   2. CodeQL (SAST) — analisis kode JS/TS untuk pola kerentanan; hasil tampil
#      di tab Security → Code scanning.
# Jalan di PR & push ke main, plus terjadwal mingguan (tangkap CVE baru pada
# dependency yang tak berubah).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Setiap Senin 00:00 UTC — tangkap advisory baru tanpa menunggu ada PR.
    - cron: '0 0 * * 1'

jobs:
  npm-audit:
    name: npm audit (advisory)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [apps/backend, apps/frontend, packages/database]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hanya audit dependency PRODUKSI (--omit=dev): devDeps tak ikut ter-ship.
      # Advisory dulu (continue-on-error) — lihat catatan di header.
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high
        continue-on-error: true

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # NON-BLOCKING: repo ini PRIVATE → upload hasil CodeQL butuh GitHub Advanced
    # Security (berbayar). Tanpa GHAS, step analyze gagal saat upload
    # ("Code scanning is not enabled"). continue-on-error agar tak menggagalkan
    # PR. CodeQL tetap berjalan & meng-analisis; begitu repo jadi public ATAU
    # GHAS diaktifkan, hapus baris ini agar jadi gate penuh.
    continue-on-error: true
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Query default + security-extended untuk cakupan lebih luas.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
