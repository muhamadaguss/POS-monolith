name: Security

# Pemindaian keamanan untuk seluruh monorepo:
#   1. npm audit (GATE KERAS) — gagalkan CI bila ada kerentanan high/critical
#      pada dependency PRODUKSI per paket. Utang high pre-existing sudah ditutup.
#   2. CodeQL (SAST, GATE PENUH) — analisis kode JS/TS untuk pola kerentanan;
#      hasil tampil di tab Security → Code scanning (gratis krn repo public).
# Jalan di PR & push ke main, plus terjadwal mingguan (tangkap CVE baru pada
# dependency yang tak berubah).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Setiap Senin 00:00 UTC — tangkap advisory baru tanpa menunggu ada PR.
    - cron: '0 0 * * 1'

jobs:
  npm-audit:
    name: npm audit (advisory)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [apps/backend, apps/frontend, packages/database]
    defaults:
      run:
        working-directory: ${{ matrix.package }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ matrix.package }}/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Hanya audit dependency PRODUKSI (--omit=dev): devDeps tak ikut ter-ship.
      # GATE KERAS: high/critical pada dependency produksi menggagalkan CI.
      # (Utang high pre-existing sudah ditutup: multer→^2.2.0 backend,
      #  form-data→^4.0.6 frontend, shadcn dipindah ke devDependencies.)
      - name: npm audit (production deps, high+)
        run: npm audit --omit=dev --audit-level=high

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    # GATE PENUH: repo public → Code scanning aktif gratis, hasil CodeQL bisa
    # di-upload ke tab Security. Temuan security-extended menggagalkan CI.
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # Query default + security-extended untuk cakupan lebih luas.
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:javascript-typescript'
