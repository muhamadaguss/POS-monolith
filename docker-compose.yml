networks:
  kasirku-network:
    driver: bridge

volumes:
  # pgdata dihapus — Postgres eksternal, tak ada container db di compose ini.
  # loki-data & grafana-data dipertahankan untuk service logging yang di-comment
  # (aktifkan bila STB di-upgrade).
  loki-data:
    name: kasirku-loki-data
  grafana-data:
    name: kasirku-grafana-data
