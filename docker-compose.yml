services:
  # Backend API (NestJS)
  backend:
    image: docker.io/muhamadaguss/kasirku-backend:latest
    container_name: kasirku-backend
    restart: unless-stopped
    # Database eksternal (bukan container) — konek via DATABASE_URL di .env.
    # Tak ada `depends_on: db` karena Postgres tidak dijalankan di compose ini.
    ports:
      - "3005:3005"
    volumes:
      - ./uploads:/app/uploads
    env_file:
      - .env
    networks:
      - kasirku-network

  # Frontend (Next.js)
  frontend:
    image: docker.io/muhamadaguss/kasirku-frontend:latest
    container_name: kasirku-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3004:3000"
    env_file:
      - .env
    environment:
      # Override PORT dari .env (yang berisi 3005 untuk backend)
      # Frontend harus listen di port 3000 agar match dengan mapping "3004:3000"
      PORT: 3000
    networks:
      - kasirku-network

  # === LOG AGGREGATION (DIMATIKAN KARENA STB 2GB RAM NGE-LAG) ===
